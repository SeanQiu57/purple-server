<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>登录九重Memory</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 360px;
            margin: auto;
        }

        input,
        button {
            width: 100%;
            box-sizing: border-box;
            margin: .5rem 0;
            padding: .5rem;
        }

        button {
            background: #3498db;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        #msg {
            color: red;
            margin-top: 1rem;
        }

        a {
            display: block;
            text-align: right;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h2>🔐 登录九重Memory</h2>
    <form id="login-form">
        <input id="username" placeholder="用户名" required>
        <input id="password" type="password" placeholder="密码" required>
        <button>登录</button>
    </form>
    <p id="msg"></p>
    <a href="register.html">没有账号？点击注册</a>

    <script>
        document.getElementById('login-form').addEventListener('submit', async e => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            msg.textContent = '';
            try {
                const r = await fetch('/prompt/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, password })
                });
                const json = await r.json();
                if (!r.ok) throw new Error(json.detail || '登录失败');
                // 统一全部用 user_id，兼容老数据清除
                localStorage.setItem('token', json.access_token);
                localStorage.setItem('user_id', json.user_id);
                if (json.username) localStorage.setItem('username', json.username);
                // 跳转到提示词控制台
                location.href = 'prompt.html';
            } catch (e) {
                msg.textContent = e.toString();
            }
        });
    </script>
</body>

</html>
