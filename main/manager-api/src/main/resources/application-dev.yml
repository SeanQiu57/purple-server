knife4j:
  production: false
  enable: true
  basic:
    enable: false
    username: renren
    password: 2ZABCDEUgF
  setting:
    enableFooter: false
  configs:
    memorydebug:
      # 这个分组的开关
      enable: true
      # 扫描你自己 Controller 的包路径
      base-package: xiaozhi.modules.memory.controller
      # 文档页面的标题、描述、版本等
      title: "九重 Memory 调试接口"
      description: "用于在智控台中调试和批量导入长期记忆的 API"
      version: "1.0.0"
      
server:
  address: 0.0.0.0
  port: 8002

spring:
  # —— 数据库配置 ——  
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://127.0.0.1:3306/xiaozhi_esp32_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      username: xiaozhi
      password: Y0urP@ssw0rd
      initial-size: 10
      max-active: 100
      min-idle: 10
      max-wait: 6000
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      stat-view-servlet:
        enabled: false
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: false
        wall:
          config:
            multi-statement-allow: true

  # —— Redis 配置 ——  
  redis:
    host: 127.0.0.1
    port: 6379
    password:     # 若你的 Redis 没密码，留空即可
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
      shutdown-timeout: 100ms

# 如需 MyBatis XML 支持，可保留或添加：
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: xiaozhi.modules.*.entity
